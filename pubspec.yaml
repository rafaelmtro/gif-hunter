name: gif_hunter
description: High-performance Flutter-based web application for searching and sharing animated GIFs.
publish_to: "none"
version: 2.0.1

environment:
  sdk: ">=2.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.2
  cupertino_icons: ^1.0.8
  share: ^2.0.4
  transparent_image: ^2.0.1
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.3.5
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  http_mock_adapter: ^0.6.1

flutter:
  uses-material-design: true
  assets:
    - images/header.png
    - .env
